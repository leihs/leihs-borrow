    context:
      task_defaults:
        max_trials: 1
        traits:
          Ruby: true
        git_options:
          submodules:
            include_match: ^.*$

      tasks:
        database-submodule-consistency:
          name: "database and spec/support/legacy-api/database point to the same commit"
          scripts:
            main:
              body: |
                #!/usr/bin/env bash
                set -exu
                git fetch --all --quiet
                git submodule update --quiet --init --recursive

                v_db_top=$(git submodule status database | cut -f 2 -d ' ')
                v_db_legacy=$(git submodule status --recursive | grep spec/support/legacy-api/database | cut -f 2 -d ' ')

                echo "database | toplevel: ${v_db_top}"
                echo "database | legacy:   ${v_db_legacy}"

                # TESTS (FAIL-FIRST)
                test $v_db_legacy == $v_db_top

        translations-file-up-to-date:
          name: "Translations sql file has to be up-to-date with translations edn file."
          scripts:
            test:
              body: |
                #!/usr/bin/env bash
                set -eux
                source shared-clj/clojure/bin/activate
                export FILE=./bin/translations-check.sql
                ./bin/build-translations
                if ! cmp -s bin/translations.sql $FILE; then
                  echo "File `translations.sql` is not up-to-date. Execute `./bin/build-translations.clj`"
                fi
