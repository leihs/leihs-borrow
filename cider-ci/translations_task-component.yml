traits:
  PostgreSQL: true

scripts:

  load-translations:
    start_when:
      database has been created:
        script_key: create-database
        states: [passed]
      build has run:
        script_key: build-borrow-uberjar
        states: [passed]
    body: |
      #!/usr/bin/env bash
      set -eux
      psql -d "$DATABASE_NAME" < bin/translations.sql
