query getModelShow($modelId: UUID!, $startDate: Date, $endDate: Date, $bothDatesGiven: Boolean!) {
  model(id: $modelId) {
    id
    name
    manufacturer
    description
    isFavorited
    images {
      id
      imageUrl
    }
    attachments {
      id
      filename
      url
      size
      # content_type # FIXME: include this field when API bug is fixed
    }
    properties {
      id
      key
      value
    }
    recommends(first: 12) {
      edges {
        node {
          id
          name
          manufacturer
          images {
            id
            imageUrl
          }
        }
      }
    }
    # for old picker:
    availableQuantityInDateRange(startDate: $startDate, endDate: $endDate) @include(if: $bothDatesGiven)
    # calendar data. TODO: when no dates given should default to "from today"
    availability(startDate: $startDate, endDate: $endDate) @include(if: $bothDatesGiven) {
      inventoryPool {
        id
        name
      }
      dates {
        date
        quantity
        startDateRestriction
        endDateRestriction
      }
    }
  }
}
